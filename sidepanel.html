<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friction Fixer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0e17;
      --surface:   #1a1929;
      --surface2:  #242338;
      --border:    #2e2d45;
      --accent:    #7c3aed;
      --accent-lt: #a78bfa;
      --green:     #22c55e;
      --red:       #ef4444;
      --amber:     #f59e0b;
      --blue:      #38bdf8;
      --text:      #e2e0f5;
      --muted:     #6e6c8a;
      --radius:    8px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─ Header ─────────────────────────────── */
    .header {
      background: var(--surface);
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 9px;
      flex-shrink: 0;
    }
    .header-logo {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent-lt);
      letter-spacing: -0.02em;
      flex: 1;
    }
    .header-logo span { color: var(--muted); font-weight: 400; font-size: 12px; }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 8px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.offline  { background: var(--red); }
    .status-dot.checking { background: var(--amber); }
    #status-label { font-size: 10px; }

    /* ─ Context bar ─────────────────────────── */
    #context-bar {
      padding: 7px 14px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
    }
    #context-bar.empty { color: var(--muted); font-style: italic; }
    #context-bar.filled { color: #93c5fd; }
    .ctx-icon { font-size: 13px; flex-shrink: 0; }
    #ctx-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: monospace;
      font-size: 10.5px;
    }
    #ctx-clear {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      flex-shrink: 0;
      line-height: 1;
      padding: 2px;
    }
    #ctx-clear:hover { color: var(--red); }
    #ctx-clear.hidden { display: none; }

    /* ─ Chat log ────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-height: 0;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      max-width: 94%;
      padding: 8px 11px;
      border-radius: var(--radius);
      line-height: 1.5;
      font-size: 12.5px;
      word-break: break-word;
      animation: fadeUp 0.15s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: #ede9fe;
      border-bottom-right-radius: 2px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--surface2);
      color: #cbd5e1;
      border-bottom-left-radius: 2px;
    }
    .msg.system {
      align-self: center;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      max-width: 100%;
      padding: 4px 8px;
    }
    .msg.error {
      align-self: flex-start;
      background: #2d1515;
      color: #fca5a5;
      border-left: 3px solid var(--red);
      border-radius: 4px var(--radius) var(--radius) 4px;
    }
    .spinner-msg {
      align-self: flex-start;
      color: var(--muted);
      font-size: 11.5px;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 2px;
    }
    .dot-pulse span {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent-lt);
      animation: pulse 1s infinite ease-in-out;
    }
    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ─ Options Panel ───────────────────────── */
    #options-panel {
      margin: 6px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }
    .option-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      animation: fadeUp 0.2s ease;
    }
    .option-card.previewing {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }
    .option-header {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .option-num {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .option-label { font-size: 12.5px; font-weight: 600; color: var(--text); }
    .option-body {
      padding: 8px 12px;
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.5;
    }
    .option-actions {
      display: flex;
      gap: 7px;
      padding: 8px 12px;
      border-top: 1px solid var(--border);
    }
    .btn-preview {
      flex: 1;
      padding: 7px;
      background: var(--surface);
      color: var(--accent-lt);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 11.5px; font-weight: 600;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-preview:hover:not(:disabled) { border-color: var(--accent); }
    .btn-preview:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-preview.active { color: #fca5a5; border-color: #4d1515; }
    .btn-accept {
      flex: 2;
      padding: 7px;
      background: #15803d;
      color: #dcfce7;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11.5px; font-weight: 700;
      transition: background 0.15s;
    }
    .btn-accept:hover { background: #166534; }
    .options-footer {
      text-align: center;
      padding: 2px 0;
    }
    .btn-dismiss-all {
      background: none; border: none;
      color: var(--muted);
      font-size: 11px; cursor: pointer;
      padding: 4px 12px;
    }
    .btn-dismiss-all:hover { color: var(--red); }

    /* ─ Toolbar ─────────────────────────────── */
    .toolbar {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .btn-tool {
      padding: 6px 11px;
      background: var(--surface2);
      color: #94a3b8;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .btn-tool:hover { background: var(--border); color: var(--text); }
    .btn-tool.active { background: var(--accent); color: #ede9fe; border-color: var(--accent); }
    #btn-undo {
      color: #fca5a5;
      border-color: #4d1515;
      display: none;
    }
    #btn-undo.visible { display: block; }
    #btn-undo:hover { background: #2d1515; }
    #btn-reset {
      margin-left: auto;
      color: #fca5a5;
      border-color: #4d1515;
    }
    #btn-reset:hover { background: #2d1515; color: #fca5a5; }

    /* ─ Input row ───────────────────────────── */
    .input-row {
      display: flex;
      gap: 7px;
      padding: 10px 12px;
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    #complaint {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 10px;
      font-size: 12.5px;
      resize: none;
      min-height: 40px;
      max-height: 80px;
      font-family: inherit;
      line-height: 1.4;
      transition: border-color 0.15s;
    }
    #complaint:focus { outline: none; border-color: var(--accent); }
    #complaint::placeholder { color: var(--muted); }
    #complaint:disabled { opacity: 0.5; cursor: not-allowed; }
    #btn-send {
      padding: 0 15px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      align-self: flex-end;
      height: 40px;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #btn-send:hover { background: #6d28d9; }
    #btn-send:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">Friction Fixer <span>v1</span></div>
    <div class="status-pill">
      <div class="status-dot checking" id="status-dot"></div>
      <span id="status-label">connecting…</span>
    </div>
  </div>

  <!-- Context bar -->
  <div id="context-bar" class="empty">
    <span class="ctx-icon">🔎</span>
    <span id="ctx-text">No element selected — click Inspector</span>
    <button id="ctx-clear" class="hidden" title="Clear selection">✕</button>
  </div>

  <!-- Chat log -->
  <div id="chat">
    <div class="msg system">Use Inspector to pick an element, then describe the issue.</div>
  </div>

  <!-- Fix options panel (populated dynamically) -->
  <div id="options-panel"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn-tool" id="btn-inspector">🔎 Inspector</button>
    <button class="btn-tool" id="btn-undo">↩ Undo</button>
    <button class="btn-tool" id="btn-reset">✕ Reset Page</button>
  </div>

  <!-- Input -->
  <div class="input-row">
    <textarea
      id="complaint"
      placeholder='Describe the issue… e.g. "nav links are invisible"'
      rows="2"
    ></textarea>
    <button id="btn-send">↑</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
